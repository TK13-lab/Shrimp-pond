name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: Backend API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shrimp_pond
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d shrimp_pond"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    env:
      API_PREFIX: api
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/shrimp_pond
      HOST: 127.0.0.1
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      JWT_SECRET: ci_jwt_secret_minimum_32_chars_long
      PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Bootstrap smoke test
        run: npm run smoke:bootstrap

  mobile:
    name: Mobile App
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/mobile

    env:
      EXPO_PUBLIC_API_BASE_URL: http://127.0.0.1:3000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Validate Expo config
        run: npx expo config --type public

      - name: Typecheck
        run: npm run typecheck
