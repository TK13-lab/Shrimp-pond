services:
  postgres:
    image: postgres:16-alpine
    container_name: shrimp-pond-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shrimp_pond
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - shrimp_pond_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d shrimp_pond"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  shrimp_pond_postgres_data:
